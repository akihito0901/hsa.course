<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教材一覧｜ホームサクセスアカデミー</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;
  color:#1a1a2e;line-height:1.8;background:#f8f7ff;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font:inherit;cursor:pointer}

:root{
  --pur:#7c3aed;--pur-l:#a78bfa;--pur-d:#5b21b6;
  --ora:#f97316;--ora-d:#ea580c;
  --blu:#3b82f6;--teal:#06b6d4;
  --dark:#0f0e17;--dark2:#1a1a2e;
  --muted:#6b7280;--line:#e5e7eb;
  --ga:linear-gradient(135deg,#7c3aed,#3b82f6);
  --gb:linear-gradient(135deg,#f97316,#ec4899);
  --gc:linear-gradient(135deg,#06b6d4,#7c3aed);
  --gd:linear-gradient(135deg,#10b981,#3b82f6);
  --ge:linear-gradient(135deg,#ec4899,#7c3aed);
  --gf:linear-gradient(135deg,#6366f1,#06b6d4);
}

.wrap{max-width:1120px;margin:0 auto;padding:0 24px}

/* ════ HEADER ════ */
header{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #ece8e3;
}
.nav{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo img{height:36px;width:auto}
.nav-right{display:flex;align-items:center;gap:18px}
.nav-back{font-size:.85rem;font-weight:700;color:var(--muted)}
.nav-back:hover{color:var(--pur)}
.nav-user{font-size:.85rem;font-weight:700;color:#1a1a2e}
.nav-user span{color:var(--pur)}

/* ════ PAGE HEAD ════ */
.page-head{padding:44px 0 28px}
.page-eyebrow{font-size:.75rem;font-weight:800;letter-spacing:.16em;color:var(--pur);margin-bottom:10px}
.page-title{font-size:clamp(1.5rem,3.2vw,2.1rem);font-weight:900;margin-bottom:10px}
.page-lead{color:var(--muted);font-size:.95rem;max-width:640px}

/* ── 全体進捗 ── */
.progress-card{
  margin-top:28px;background:#fff;border-radius:20px;
  padding:24px 28px;box-shadow:0 8px 30px rgba(124,58,237,.08);
  display:flex;align-items:center;gap:28px;flex-wrap:wrap;
}
.progress-num{font-size:2rem;font-weight:900;background:var(--ga);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0}
.progress-num span{font-size:1.1rem}
.progress-bar-wrap{flex:1;min-width:200px}
.progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:8px}
.progress-bar{height:10px;border-radius:999px;background:#ede9fe;overflow:hidden}
.progress-fill{height:100%;background:var(--ga);border-radius:999px;transition:width .4s ease;width:0%}
.bm-toggle{
  flex-shrink:0;font-size:.82rem;font-weight:700;
  border:2px solid #ddd6fe;color:var(--pur);
  padding:10px 18px;border-radius:999px;
  background:#fff;transition:background .2s,color .2s;
  display:flex;align-items:center;gap:6px;
}
.bm-toggle.on{background:var(--ga);color:#fff;border-color:transparent}

/* ── 会員ステータス ── */
.member-card{
  margin-top:28px;background:#fff;border-radius:20px;
  padding:24px 28px;box-shadow:0 8px 30px rgba(124,58,237,.08);
}
.member-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
.member-status{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.member-pill{font-size:.78rem;font-weight:800;padding:6px 14px;border-radius:999px;flex-shrink:0}
.member-pill.free{background:#f3f0ff;color:var(--pur)}
.member-pill.pro{background:var(--ga);color:#fff}
.member-detail{font-size:.85rem;color:var(--muted);line-height:1.7}
.member-detail strong{color:#1a1a2e}
.member-actions{display:flex;gap:10px;flex-wrap:wrap}
.member-btn{
  font-size:.82rem;font-weight:700;padding:10px 18px;border-radius:999px;
  border:2px solid #ddd6fe;color:var(--pur);background:#fff;
}
.member-btn:hover{background:#f8f7ff}
.member-btn.primary{background:var(--ga);color:#fff;border-color:transparent}
.member-btn.primary:hover{filter:brightness(1.06);background:var(--ga)}
.member-btn.ghost{border-color:var(--line);color:var(--muted)}
.member-note{font-size:.76rem;color:#bbb;margin-top:16px}

/* ════ LAYOUT ════ */
.board{display:grid;grid-template-columns:240px 1fr;gap:36px;padding:36px 0 100px;align-items:start}

/* ── カテゴリタブ（サイドバー） ── */
.cat-nav{position:sticky;top:88px;display:flex;flex-direction:column;gap:6px}
.cat-btn{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:14px;
  font-size:.9rem;font-weight:700;color:#555;
  border:1px solid transparent;text-align:left;background:transparent;width:100%;
  transition:background .15s,color .15s;
}
.cat-btn:hover{background:#fff}
.cat-btn.active{background:#fff;color:#1a1a2e;box-shadow:0 4px 18px rgba(124,58,237,.1);border-color:#ede9fe}
.cat-ic{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  display:grid;place-items:center;font-size:1.05rem;color:#fff;
}
.cat-count{margin-left:auto;font-size:.72rem;color:#aaa;font-weight:700}
.cat-btn.active .cat-count{color:var(--pur)}

@media(max-width:860px){
  .board{grid-template-columns:1fr;gap:20px}
  .cat-nav{
    position:sticky;top:68px;z-index:20;
    flex-direction:row;gap:8px;overflow-x:auto;
    background:#f8f7ff;padding:10px 0;margin:0 -24px;padding-left:24px;padding-right:24px;
    border-bottom:1px solid #ece4ff;
  }
  .cat-btn{flex-shrink:0;padding:10px 14px}
  .cat-count{display:none}
}

/* ── カテゴリパネル ── */
.cat-panel{display:none}
.cat-panel.active{display:block}
.cat-panel-head{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.cat-panel-ic{
  width:52px;height:52px;border-radius:16px;flex-shrink:0;
  display:grid;place-items:center;font-size:1.5rem;color:#fff;
}
.cat-panel-title{font-size:1.3rem;font-weight:900}
.cat-panel-desc{font-size:.87rem;color:var(--muted);margin-top:2px}

/* ── レッスンカード ── */
.lesson{
  background:#fff;border-radius:18px;margin-bottom:14px;
  box-shadow:0 2px 14px rgba(0,0,0,.04);border:1px solid #f0edff;
  overflow:hidden;
}
.lesson-head{
  display:flex;align-items:center;gap:16px;
  padding:18px 22px;cursor:pointer;
}
.lesson-no{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:#f3f0ff;color:var(--pur);
  font-size:.85rem;font-weight:900;
  display:grid;place-items:center;
}
.lesson-main{flex:1;min-width:0}
.lesson-title{font-size:.98rem;font-weight:800;color:#1a1a2e;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lesson-meta{font-size:.78rem;color:#999;margin-top:3px}
.badge{
  font-size:.68rem;font-weight:800;padding:3px 10px;border-radius:999px;
  letter-spacing:.03em;flex-shrink:0;
}
.badge-soon{background:#f3f0ff;color:var(--pur)}
.badge-live{background:#ecfdf5;color:#059669}
.lesson-star{
  flex-shrink:0;width:36px;height:36px;border-radius:50%;
  display:grid;place-items:center;font-size:1rem;color:#ccc;
  background:transparent;border:none;
}
.lesson-star.on{color:var(--ora)}
.lesson-chev{flex-shrink:0;color:#bbb;font-size:.8rem;transition:transform .2s}
.lesson.open .lesson-chev{transform:rotate(180deg)}
.lesson-body{max-height:0;overflow:hidden;transition:max-height .25s ease}
.lesson.open .lesson-body{max-height:200px}
.lesson-body-in{padding:0 22px 22px 72px;font-size:.88rem;color:#555;line-height:1.85}
.lesson-soon-note{
  margin-top:12px;display:inline-flex;align-items:center;gap:6px;
  font-size:.78rem;color:#999;background:#f8f7ff;padding:6px 12px;border-radius:999px;
}
.lesson-lock-note{
  margin-top:12px;font-size:.83rem;color:#888;background:#f8f7ff;
  padding:12px 16px;border-radius:12px;line-height:1.7;
}
.lesson-lock-note .member-btn{margin-top:10px}

.filter-empty{
  text-align:center;padding:60px 20px;color:#aaa;font-size:.9rem;
}
.lesson-no.done{background:var(--ga);color:#fff}

/* ════ READER ════ */
.reader-overlay{
  position:fixed;inset:0;background:#f8f7ff;z-index:200;
  overflow-y:auto;display:none;
}
.reader-overlay.open{display:block}
.reader-top{
  position:sticky;top:0;z-index:2;
  background:rgba(255,255,255,.97);backdrop-filter:blur(10px);
  border-bottom:1px solid #ece8e3;
}
.reader-top-in{
  max-width:760px;margin:0 auto;padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.reader-back{
  font-size:.85rem;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  background:none;border:none;
}
.reader-back:hover{color:var(--pur)}
.reader-cat-mini{font-size:.78rem;color:#aaa;font-weight:700}
.reader-body{max-width:760px;margin:0 auto;padding:48px 24px 100px}
.reader-eyebrow{font-size:.75rem;font-weight:800;letter-spacing:.12em;color:var(--pur);margin-bottom:12px}
.reader-title{font-size:clamp(1.35rem,3.4vw,1.7rem);font-weight:900;margin-bottom:12px;line-height:1.45}
.reader-meta{
  font-size:.82rem;color:#999;margin-bottom:36px;padding-bottom:28px;
  border-bottom:1px solid var(--line);
}
.reader-article h3{font-size:1.1rem;font-weight:900;margin:36px 0 14px;color:#1a1a2e}
.reader-article h3:first-child{margin-top:0}
.reader-article p{font-size:.95rem;color:#333;margin-bottom:16px;line-height:1.95}
.reader-article ul{margin:0 0 18px 0;list-style:none}
.reader-article ul li{
  position:relative;padding:9px 0 9px 24px;
  font-size:.92rem;color:#333;border-bottom:1px solid #f5f3ff;line-height:1.8;
}
.reader-article ul li:last-child{border-bottom:none}
.reader-article ul li::before{
  content:'';position:absolute;left:2px;top:19px;
  width:6px;height:6px;border-radius:50%;background:var(--ga);
}
.reader-tip{
  margin:8px 0 8px;background:#f3f0ff;border-radius:16px;padding:22px 24px;
  font-size:.9rem;color:#463a7a;line-height:1.9;
}
.reader-tip strong{
  color:var(--pur-d);display:block;margin-bottom:8px;
  font-size:.78rem;letter-spacing:.06em;
}
.reader-complete-btn{
  margin-top:44px;width:100%;text-align:center;
  background:var(--ga);color:#fff;font-weight:800;font-size:.95rem;
  padding:17px;border-radius:999px;border:none;
  transition:filter .2s;
}
.reader-complete-btn:hover{filter:brightness(1.06)}
.reader-complete-btn.done{background:#ecfdf5;color:#059669}
.reader-nav{display:flex;justify-content:space-between;gap:14px;margin-top:16px}
.reader-nav-btn{
  flex:1;text-align:center;font-size:.85rem;font-weight:700;color:var(--pur);
  padding:13px 16px;border-radius:999px;border:2px solid #ddd6fe;
}
.reader-nav-btn:hover{background:#f3f0ff}
.reader-nav-btn.disabled{opacity:.35;pointer-events:none}
@media(max-width:680px){
  .reader-body{padding:32px 20px 80px}
}

/* カテゴリカラー */
.c1{background:var(--gc)}
.c2{background:var(--gb)}
.c3{background:var(--ge)}
.c4{background:var(--gd)}
.c5{background:var(--ga)}
.c6{background:var(--gf)}
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="logo" href="../home.success.academy/index.html">
      <img src="images/logo.png" alt="Home Success Academy">
    </a>
    <div class="nav-right">
      <a class="nav-back" href="../home.success.academy/index.html">サイトトップへ</a>
      <div class="nav-user">ようこそ、<span>受講生</span>さん</div>
    </div>
  </div>
</header>

<div class="wrap page-head">
  <p class="page-eyebrow">MATERIALS</p>
  <h1 class="page-title">教材一覧</h1>
  <p class="page-lead">「基礎」コースはどなたでもすべて無料で読めます。デザイン・SNSなどのスキル系コースは第1章が無料で、月額会員になると入会日から1週間ごとに続きの教材が解放されていきます（すべて解放されるまで、目安で約1年のカリキュラムです）。</p>

  <div class="member-card" id="memberCard"></div>

  <div class="progress-card">
    <div class="progress-num" id="progressNum">0<span>%</span></div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>教材の公開状況</span><span id="progressCount">0 / 0 教材が公開済み</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <button class="bm-toggle" id="bmToggle" type="button">★ ブックマークのみ表示</button>
  </div>
</div>

<div class="wrap board">
  <nav class="cat-nav" id="catNav"></nav>
  <div id="catPanels"></div>
</div>

<script>
const CATEGORIES = [

      {t:'セキュリティとトラブル対策', d:'パスワード管理や情報漏えい対策など、最低限おさえておきたい知識です。', min:9, url:'lessons/basic-5.html'},

      {t:'プロンプト設計のコツ', d:'欲しい回答を引き出すための、質問・指示の組み立て方です。', min:13, url:'lessons/ai-2.html'},

      {t:'AIによる業務効率化', d:'調べもの・要約・整理など、日々の作業を時短する使い方です。', min:11, url:'lessons/ai-4.html'},
      {t:'AIライティングとの付き合い方', d:'AIに書かせた文章を、自分の言葉として整えるための考え方です。', min:9, url:'lessons/ai-5.html'},

];

const catNav = document.getElementById('catNav');
const catPanels = document.getElementById('catPanels');
const memberCard = document.getElementById('memberCard');
const STORE_KEY = 'hsa_bookmarks';
const DONE_KEY = 'hsa_completed';
const SUB_KEY = 'hsa_subscribed';
const JOIN_KEY = 'hsa_join_date';
const OFFSET_KEY = 'hsa_demo_offset';
const bookmarks = new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]'));
const completed = new Set(JSON.parse(localStorage.getItem(DONE_KEY) || '[]'));
let bmOnly = false;
let subscribed = localStorage.getItem(SUB_KEY) === '1';
let joinDate = Number(localStorage.getItem(JOIN_KEY)) || null;
let demoOffsetDays = Number(localStorage.getItem(OFFSET_KEY)) || 0;

const DAY_MS = 24*60*60*1000;
const WEEK_MS = 7*DAY_MS;

function lessonId(catId, idx){ return catId + '-' + idx; }

function saveBookmarks(){
  localStorage.setItem(STORE_KEY, JSON.stringify([...bookmarks]));
}
function saveCompleted(){
  localStorage.setItem(DONE_KEY, JSON.stringify([...completed]));
}

/* ── 会員・週次アンロック（デモ用シミュレーション） ── */
function nowMs(){ return Date.now() + demoOffsetDays*DAY_MS; }
function elapsedDays(){ return joinDate ? Math.floor((nowMs()-joinDate)/DAY_MS) : 0; }
function elapsedWeeks(){ return joinDate ? Math.floor((nowMs()-joinDate)/WEEK_MS) : 0; }

function subscribe(){
  subscribed = true;
  joinDate = Date.now();
  demoOffsetDays = 0;
  localStorage.setItem(SUB_KEY,'1');
  localStorage.setItem(JOIN_KEY, String(joinDate));
  localStorage.setItem(OFFSET_KEY,'0');
  render();
}
function unsubscribe(){
  subscribed = false;
  localStorage.setItem(SUB_KEY,'0');
  render();
}
function advanceWeek(){
  demoOffsetDays += 7;
  localStorage.setItem(OFFSET_KEY, String(demoOffsetDays));
  render();
}
function resetDemo(){
  demoOffsetDays = 0;
  localStorage.setItem(OFFSET_KEY,'0');
  render();
}

// 基礎カテゴリは常に全開放（無料）。
// スキル系カテゴリは idx===0 が無料、idx>=1 は「入会日 + idx週」で解放
function getAccess(catId, lesson, idx){
  if(!lesson.url) return 'soon';
  if(catId === 'basic') return 'free';
  if(idx === 0) return 'free';
  if(!subscribed) return 'member';
  return elapsedWeeks() >= idx ? 'live' : 'week';
}
function daysUntilUnlock(idx){
  return Math.max(0, idx*7 - elapsedDays());
}

function renderMemberCard(){
  if(!subscribed){
    memberCard.innerHTML = `
      <div class="member-row">
        <div class="member-status">
          <span class="member-pill free">無料ユーザー</span>
          <span class="member-detail"><strong>基礎コースはすべて無料</strong>、スキル系コースは<strong>第1章まで無料</strong>で読めます。月額会員になると、入会日から毎週続きが解放されます。</span>
        </div>
        <div class="member-actions">
          <button class="member-btn primary" data-action="subscribe" type="button">［デモ］月額会員になる</button>
        </div>
      </div>`;
    return;
  }
  const week = elapsedWeeks();
  const daysToNext = Math.max(0, (week+1)*7 - elapsedDays());
  const joinLabel = new Date(joinDate).toLocaleDateString('ja-JP');
  memberCard.innerHTML = `
    <div class="member-row">
      <div class="member-status">
        <span class="member-pill pro">月額会員</span>
        <span class="member-detail">入会日：<strong>${joinLabel}</strong>／ 現在 <strong>第${week+1}週</strong>（次の解放まであと${daysToNext}日）</span>
      </div>
      <div class="member-actions">
        <button class="member-btn" data-action="advance" type="button">［デモ］1週間進める</button>
        <button class="member-btn ghost" data-action="reset" type="button">［デモ］週をリセット</button>
        <button class="member-btn ghost" data-action="unsubscribe" type="button">解約する（デモ）</button>
      </div>
    </div>
    <div class="member-note">※ 現在はUIプロトタイプです。実際の決済・自動解放は本番の課金システム連携後に有効になります。</div>`;
}

memberCard.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  if(action==='subscribe') subscribe();
  else if(action==='advance') advanceWeek();
  else if(action==='reset') resetDemo();
  else if(action==='unsubscribe') unsubscribe();
});

function render(){
  catNav.innerHTML = CATEGORIES.map((c,i) => `
    <button class="cat-btn ${i===0?'active':''}" data-cat="${c.id}">
      <span class="cat-ic ${c.cls}">${c.icon}</span>
      ${c.title}
      <span class="cat-count">${c.lessons.length}</span>
    </button>
  `).join('');

  catPanels.innerHTML = CATEGORIES.map((c,i) => `
    <div class="cat-panel ${i===0?'active':''}" data-cat="${c.id}">
      <div class="cat-panel-head">
        <span class="cat-panel-ic ${c.cls}">${c.icon}</span>
        <div>
          <div class="cat-panel-title">${c.title}</div>
          <div class="cat-panel-desc">${c.desc}</div>
        </div>
      </div>
      <div class="lesson-list">
        ${c.lessons.map((l, idx) => {
          const id = lessonId(c.id, idx);
          const isBm = bookmarks.has(id);
          const isDone = completed.has(id);
          const access = getAccess(c.id, l, idx);
          const clickable = access === 'free' || access === 'live';
          const BADGE = {
            free:{cls:'badge-live', text:'無料公開'},
            live:{cls:'badge-live', text:'公開中'},
            member:{cls:'badge-soon', text:'🔒 会員限定'},
            week:{cls:'badge-soon', text:`🔒 第${idx+1}週で解放`},
            soon:{cls:'badge-soon', text:'準備中'},
          }[access];
          let note = '';
          if(access === 'soon'){
            note = '<div class="lesson-soon-note">🔒 本文教材は準備中です。公開までしばらくお待ちください。</div>';
          } else if(access === 'member'){
            note = '<div class="lesson-lock-note">月額会員になると、入会日から1週間ごとに続きの教材が解放されていきます。<br><button class="member-btn primary" data-action="subscribe" type="button">［デモ］月額会員になる</button></div>';
          } else if(access === 'week'){
            note = `<div class="lesson-lock-note">第${idx+1}週（あと${daysUntilUnlock(idx)}日）で解放される予定です。それまでは、上の教材から順番に進めてお待ちください。</div>`;
          }
          return `
          <div class="lesson" data-id="${id}" data-bm="${isBm?'1':'0'}">
            <div class="lesson-head" data-url="${clickable ? l.url : ''}" data-toggle="${clickable ? '' : id}">
              <div class="lesson-no ${isDone?'done':''}">${isDone ? '✓' : String(idx+1).padStart(2,'0')}</div>
              <div class="lesson-main">
                <div class="lesson-title">
                  ${l.t}
                  <span class="badge ${BADGE.cls}">${BADGE.text}</span>
                </div>
                <div class="lesson-meta">目安 ${l.min}分</div>
              </div>
              <button class="lesson-star ${isBm?'on':''}" data-star="${id}" type="button" aria-label="ブックマーク">★</button>
              <div class="lesson-chev">${clickable ? '→' : '▾'}</div>
            </div>
            <div class="lesson-body">
              <div class="lesson-body-in">
                ${l.d}
                ${note}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  renderMemberCard();
  updateProgress();
  applyFilter();
}

function updateProgress(){
  const total = CATEGORIES.reduce((s,c)=>s+c.lessons.length,0);
  const ready = CATEGORIES.reduce((s,c)=>s+c.lessons.filter(l=>l.url).length,0);
  const pct = total ? Math.round(ready/total*100) : 0;
  document.getElementById('progressNum').innerHTML = pct + '<span>%</span>';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${ready} / ${total} 教材が公開済み`;
}

function applyFilter(){
  document.querySelectorAll('.lesson').forEach(el => {
    const show = !bmOnly || el.dataset.bm === '1';
    el.style.display = show ? '' : 'none';
  });
  document.querySelectorAll('.cat-panel').forEach(panel => {
    const visible = [...panel.querySelectorAll('.lesson')].some(el => el.style.display !== 'none');
    let empty = panel.querySelector('.filter-empty');
    if(bmOnly && !visible){
      if(!empty){
        empty = document.createElement('div');
        empty.className = 'filter-empty';
        empty.textContent = 'ブックマークした教材はまだありません。';
        panel.appendChild(empty);
      }
    } else if(empty){
      empty.remove();
    }
  });
}

catNav.addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if(!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active', b===btn));
  document.querySelectorAll('.cat-panel').forEach(p=>p.classList.toggle('active', p.dataset.cat===btn.dataset.cat));
});

catPanels.addEventListener('click', e => {
  const subBtn = e.target.closest('[data-action="subscribe"]');
  if(subBtn){
    subscribe();
    return;
  }
  const star = e.target.closest('[data-star]');
  if(star){
    const id = star.dataset.star;
    if(bookmarks.has(id)){ bookmarks.delete(id); } else { bookmarks.add(id); }
    saveBookmarks();
    star.classList.toggle('on');
    star.closest('.lesson').dataset.bm = bookmarks.has(id) ? '1' : '0';
    applyFilter();
    return;
  }
  const opener = e.target.closest('[data-url]');
  if(opener && opener.dataset.url){
    window.location.href = opener.dataset.url;
    return;
  }
  const head = e.target.closest('[data-toggle]');
  if(head && head.dataset.toggle){
    head.closest('.lesson').classList.toggle('open');
  }
});

document.getElementById('bmToggle').addEventListener('click', () => {
  bmOnly = !bmOnly;
  document.getElementById('bmToggle').classList.toggle('on', bmOnly);
  applyFilter();
});

render();
</script>
</body>
</html>
